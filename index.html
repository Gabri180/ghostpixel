<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    
    <title>Ghost Pixel Pro</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000 !important;
            overflow: hidden;
            cursor: none;
            touch-action: none; /* Evita zoom accidental */
        }

        #canvas {
            display: block;
            background-color: #000000;
        }
    </style>
</head>
<body onclick="startEffect()">

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Ajustar resolución inicial
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        window.addEventListener('resize', resize);
        resize();

        let drawing = false;
        let currentStep = 0;
        let speed = 2; // Puntos por frame

        // --- RUTA DEL DIBUJO ---
        function generatePath() {
            const w = canvas.width;
            const h = canvas.height;
            const p = [];

            // 1. Dibujar el "3" (Zona Segura Top-Left)
            const nX = w * 0.15; 
            const nY = h * 0.15; 
            const nS = w * 0.07; // Tamaño del número

            const threePoints = [
                {x: nX, y: nY}, 
                {x: nX + nS, y: nY},
                {x: nX + nS, y: nY + nS},
                {x: nX + nS/2, y: nY + nS},
                {x: nX + nS, y: nY + nS},
                {x: nX + nS, y: nY + nS*2},
                {x: nX, y: nY + nS*2}
            ];
            interpolate(p, threePoints, 15);

            // 2. SALTO INVISIBLE (Coordenada centinela)
            p.push({x: -1, y: -1});

            // 3. Dibujar Corazón (Centro)
            const cx = w / 2;
            const cy = h / 2.2; // Ligeramente subido para evitar barra inferior Safari
            const heartSize = w * 0.022; 

            for (let t = 0; t <= Math.PI * 2; t += 0.02) {
                let x = cx + 16 * Math.sin(t)**3 * heartSize;
                let y = cy - (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * heartSize;
                p.push({x, y});
            }
            return p;
        }

        function interpolate(pathArray, keyPoints, steps) {
            for (let i = 0; i < keyPoints.length - 1; i++) {
                let start = keyPoints[i];
                let end = keyPoints[i+1];
                for (let s = 0; s <= steps; s++) {
                    let t = s / steps;
                    pathArray.push({
                        x: start.x + (end.x - start.x) * t,
                        y: start.y + (end.y - start.y) * t
                    });
                }
            }
        }

        let fullPath = generatePath();

        function startEffect() {
            if (drawing) return;

            // Truco para Safari: Scroll para intentar ocultar UI
            window.scrollTo(0, 1);

            // Intentar Fullscreen (solo funcionará en Android/PC, en iOS se ignora pero no rompe el código)
            if (canvas.requestFullscreen) canvas.requestFullscreen();
            else if (canvas.webkitRequestFullscreen) canvas.webkitRequestFullscreen();

            // Ocultar cursor
            document.body.style.cursor = 'none';

            // Limpieza a negro puro
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawing = true;
            animate();
        }

        function animate() {
            for (let i = 0; i < speed; i++) {
                if (currentStep >= fullPath.length) {
                    drawing = false;
                    return;
                }

                const target = fullPath[currentStep];

                if (target.x === -1) {
                    currentStep++;
                    continue; 
                }

                // Estilo del "Píxel"
                ctx.shadowBlur = 12;
                ctx.shadowColor = "white";
                ctx.fillStyle = "white";
                
                // Jitter para efecto "energía"
                const jX = (Math.random() - 0.5) * 1.5;
                const jY = (Math.random() - 0.5) * 1.5;

                ctx.beginPath();
                ctx.arc(target.x + jX, target.y + jY, 1.8, 0, Math.PI * 2);
                ctx.fill();

                currentStep++;
            }
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
